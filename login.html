<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Guide Lanka</title>

    <!-- Unified CSS -->
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/login.css" />

    <!-- Google Fonts & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <header class="login-header">
      <nav>
        <a href="index.html" class="back-home" title="Back to Home">Back to Home</a>
      </nav>
    </header>

    <main class="login">
      <img src="assets/img/login.jpg" alt="Login Background" class="login__img" />

      <form action="" class="login-container">
        <h1 class="login__title">Sign In</h1>

        <div class="login__content">
          <div class="login__box">
            <i class="ri-user-3-line login__icon"></i>
            <input type="email" required class="login__input" id="login-email" placeholder="Email Address" />
          </div>

          <div class="login__box">
            <i class="ri-lock-2-line login__icon"></i>
            <input type="password" required class="login__input" id="login-pass" placeholder="Password" />
          </div>
        </div>

        <div class="login__check">
          <div class="login__check-group">
            <input type="checkbox" class="login__check-input" id="login-check" />
            <label for="login-check" class="login-remember">Remember me</label>
          </div>
          <a href="#" class="login__forgot">Forgot Password?</a>
        </div>

        <button type="submit" class="login__button">SIGN IN</button>

        <p class="login__register">
          Don't have an account? <a href="#">Register Now</a>
        </p>
      </form>
    </main>
  </body>
</html>
